<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Máquina Expendedora - Matemática Discreta</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<!-- CSS propio -->
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="text-center py-4 bg-dark text-white shadow">
  <h1 class="m-0"><i class="bi bi-cup-straw"></i> Máquina Expendedora</h1>
  <small class="text-secondary">Simulación de una máquina de estados finitos — Matemática Discreta</small>
</header>

<div class="container my-4">
  <div class="row g-4">

    <!-- ============ PANEL IZQUIERDO: PRODUCTOS ============ -->
    <div class="col-lg-7">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-secondary text-white">
          <i class="bi bi-grid-3x3-gap-fill"></i> Productos disponibles
        </div>
        <div class="card-body">
          <div id="grid-productos" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
            <!-- Las tarjetas de productos se generan dinámicamente con JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- ============ PANEL DERECHO: MÁQUINA ============ -->
    <div class="col-lg-5">
      <div class="card shadow-sm maquina-panel">
        <div class="card-body">

          <!-- PANTALLA LCD -->
          <div class="lcd mb-3">
            <div id="lcd-pantalla" class="lcd-texto">SELECCIONE UN PRODUCTO</div>
          </div>

          <!-- PRODUCTO SELECCIONADO -->
          <div class="mb-3">
            <label class="form-label fw-bold text-muted">Producto seleccionado:</label>
            <div id="producto-seleccionado" class="border rounded p-2 text-center bg-light">
              <span class="text-muted">Ninguno</span>
            </div>
          </div>

          <!-- DINERO INGRESADO -->
          <div class="mb-3">
            <label class="form-label fw-bold text-muted">Dinero ingresado:</label>
            <div id="dinero-ingresado" class="fs-4 fw-bold text-success text-center border rounded p-2 bg-light">
              S/ 0.00
            </div>
          </div>

          <!-- BOTONES DE MONEDAS/BILLETES -->
          <div class="mb-3">
            <label class="form-label fw-bold text-muted">Insertar dinero:</label>
            <div id="botones-dinero" class="d-grid gap-2" style="grid-template-columns: repeat(4, 1fr);">
              <!-- Botones generados por JS -->
            </div>
          </div>

          <!-- ACCIONES -->
          <div class="d-grid gap-2 mb-3">
            <button id="btn-comprar" class="btn btn-success btn-lg">
              <i class="bi bi-cart-check-fill"></i> Comprar
            </button>
            <button id="btn-cancelar" class="btn btn-outline-danger">
              <i class="bi bi-x-circle"></i> Cancelar
            </button>
          </div>

          <!-- BANDEJA DE ENTREGA -->
          <div class="mb-3">
            <label class="form-label fw-bold text-muted">
              <i class="bi bi-box-arrow-down"></i> Bandeja de entrega:
            </label>
            <div id="bandeja-entrega" class="border rounded p-3 text-center bg-light">
              <span class="text-muted">Vacía</span>
            </div>
          </div>

          <!-- VUELTO -->
          <div>
            <label class="form-label fw-bold text-muted">
              <i class="bi bi-cash-coin"></i> Vuelto entregado:
            </label>
            <div id="panel-vuelto" class="border rounded p-3 bg-light">
              <span class="text-muted">S/ 0.00</span>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<footer class="text-center text-muted py-3">
  <small>Proyecto académico · Simulación de Máquina de Estados Finitos (FSM)</small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Scripts propios (orden importa) -->
<script src="js/productos.js"></script>
<script src="js/vuelto.js"></script>
<script src="js/app.js"></script>
</body>
</html>
